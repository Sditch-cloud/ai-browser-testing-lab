# Test Case: Search
# Triggered via Copilot Chat: "Run the search test case"

name: search
description: Verify that user search returns the expected filtered result
author: AI Browser Testing Lab
tags:
  - search
  - smoke
baseUrl: http://localhost:5173
timeout: 30000
continueOnFail: true

steps:
  - type: navigate
    url: /login
    description: Open the login page

  - type: fill
    testId: login-username
    value: demo
    description: Enter username

  - type: fill
    testId: login-password
    value: 123456
    description: Enter password

  - type: click
    testId: login-submit
    description: Sign in

  - type: wait
    testId: welcome-message
    description: Wait for the dashboard welcome message

  - type: click
    testId: nav-users
    description: Open the users page

  - type: wait
    testId: user-search
    description: Wait for the user search field

  - type: fill
    testId: user-search
    value: Alice
    description: Filter users by name

  - type: screenshot
    screenshotPath: reports/search-results.png
    description: Capture filtered search results

assertions:
  - type: url-contains
    expected: /users
    description: URL should reflect the users page

  - type: element-visible
    testId: user-search
    description: Search input should remain visible

  - type: element-text
    testId: table-cell-name-0
    expected: Alice Johnson
    description: First filtered result should be Alice Johnson

  - type: element-count
    selector: "tbody [data-testid^='table-row-']"
    count: 1
    description: Exactly one user row should remain after filtering

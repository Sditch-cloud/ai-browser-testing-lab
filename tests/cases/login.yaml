# Test Case: Login
# Triggered via Copilot Chat: "Run the login test case"

name: login
description: Verify that a user can log in with valid credentials
author: AI Browser Testing Lab
tags:
  - auth
  - smoke
baseUrl: http://localhost:5173
timeout: 30000
continueOnFail: false

steps:
  - type: navigate
    url: http://localhost:5173/login
    description: Open the login page

  - type: fill
    target: username field
    value: demo
    description: Enter username

  - type: fill
    target: password field
    value: 123456
    description: Enter password

  - type: click
    target: sign in button
    description: Click the Sign In button

  - type: wait
    testId: welcome-message
    description: Wait for the dashboard welcome message

  - type: screenshot
    screenshotPath: reports/login-success.png
    description: Capture post-login screenshot

assertions:
  - type: url-contains
    expected: /dashboard
    description: URL should indicate successful login
    continueOnFail: false

  - type: element-visible
    testId: welcome-message
    description: Welcome message should be visible

  - type: element-text
    testId: welcome-message
    expected: Welcome back, Demo User!
    description: Welcome message should confirm successful login
